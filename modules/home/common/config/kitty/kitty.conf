font_family      JetBrainsMono Nerd Font
font_size 11.0
background_blur 1
background_opacity 0.8
enable_audio_bell no
update_check_interval 0
include ./dracula.conf
hide_window_decorations yes

scrollback_lines 100000

allow_remote_control yes
listen_on unix:/tmp/kitty-
confirm_os_window_close 1

map alt+g launch --cwd=current --type=overlay ~/.config/kitty/scripts/kitty-window-selector.sh

disable_ligatures always

copy_on_select yes

mouse_map right press ungrabbed paste_from_selection

map ctrl+shift+enter no_op
map ctrl+shift+r no_op

clipboard_control write-clipboard write-primary no-append

map alt+a>shift+o new_tab
map alt+a>shift+q close_tab
map alt+a>b launch --allow-remote-control kitty @ focus-tab --match recent:1

tab_bar_style hidden
