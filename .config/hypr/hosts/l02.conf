exec-once = sh -c 'pgrep -x wvkbd-mobintl >/dev/null || exec wvkbd-mobintl --hidden -L 280 -l full,special,emoji'
exec-once = sh -c 'pgrep -f tablet_mode_watcher >/dev/null || { mkdir -p ~/.local/state && exec tablet_mode_watcher >>~/.local/state/tablet_mode_watcher.log 2>&1; }'
bind = $mainMod SHIFT, T, exec, pkill -USR1 -f tablet_mode_watcher
bind = $mainMod SHIFT, K, exec, tablet_mode_apply osk-toggle
