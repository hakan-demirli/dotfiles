name: "Nix Build and Test"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-22.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Run Flake Checks
        run: |
          # See: https://github.com/actions/partner-runner-images/issues/147
          checks=$(nix flake show --json 2>/dev/null | jq -r '.checks."${{ matrix.system }}" // {} | keys[]')
          for check in $checks; do
            if [[ "${{ matrix.system }}" == "aarch64-linux" && "$check" == "ephemeral-root" ]]; then
              echo "Skipping $check on aarch64-linux (requires KVM)"
              continue
            fi
            echo "Building checks.${{ matrix.system }}.$check"
            nix build .#checks.${{ matrix.system }}.$check
          done

  flake-check:
    name: flake-check
    needs: [checks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.checks.result }}" != "success" ]]; then
            echo "One or more flake checks failed"
            exit 1
          fi

  integration-tests:
    needs: [checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: [test-ss0, test-ssh-acl, test-harmonia]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Run Integration Test ${{ matrix.test }}
        run: nix run .#${{ matrix.test }}

  build-systems:
    needs: [checks]
    strategy:
      fail-fast: false
      matrix:
        include:
          # - name: l01
          #   target: nixosConfigurations.l01.config.system.build.toplevel
          #   runner: ubuntu-latest
          - name: vm_oracle_x86
            target: nixosConfigurations.vm_oracle_x86.config.system.build.toplevel
            runner: ubuntu-latest
          - name: vm_qemu_x86
            target: nixosConfigurations.vm_qemu_x86.config.system.build.toplevel
            runner: ubuntu-latest
          - name: s01
            target: nixosConfigurations.s01.config.system.build.toplevel
            runner: ubuntu-latest
          # - name: s02
          #   target: nixosConfigurations.s02.config.system.build.toplevel
          #   runner: ubuntu-latest
          - name: vm_oracle_aarch64
            target: nixosConfigurations.vm_oracle_aarch64.config.system.build.toplevel
            runner: ubuntu-22.04-arm
          # - name: vm_qemu_aarch64
          #   target: nixosConfigurations.vm_qemu_aarch64.config.system.build.toplevel
          #   runner: ubuntu-22.04-arm
          - name: kexec
            target: kexec
            runner: ubuntu-22.04-arm
          - name: macbook
            target: darwinConfigurations.macbook.system
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        uses: BRAINSia/free-disk-space@v2
        with:
          tool-cache: false
          mandb:   true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build ${{ matrix.name }}
        run: nix build .#${{ matrix.target }}
