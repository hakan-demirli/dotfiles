id = "dev-fpga"
description = "Standalone multi-user FPGA dev/build server, outside the lab-fpga slurm cluster"
kind = "nixos"
node_role = "personal"
modules = [
  "system/base",
  "system/server-base",
  "system/impermanence",
  "system/ephemeral-root",
]

[tunables]
"fpga.vendor" = "amd-xilinx"
"vivado.onBox" = true
"vivado.version" = "2025.1"
