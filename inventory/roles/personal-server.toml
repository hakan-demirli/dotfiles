id = "personal-server"
description = "Personal home server (slurm worker, optional remote desktop)"
kind = "nixos"
node_role = "compute"
modules = [
  "system/base",
  "system/server-base",
  "system/amd-graphics",
  "system/sound",
  "system/impermanence",
  "system/ephemeral-root",
  "system/gnupg",
  "system/virtualisation",
  "system/automount",
  "system/nix-settings",
  "system/overlays",
  "services/warp",
  "services/tailscale",
  "services/slurm-client",
  "services/desktop/remotedesktop",
  "services/remotedesktop-session",
  "services/sops",
  "services/earlyoom",
  "personal-server",
]

[tunables]
"remotedesktop.enable" = false
