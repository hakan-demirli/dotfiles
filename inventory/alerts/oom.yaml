groups:
  - name: oom
    interval: 30s
    rules:
      - alert: OOMKillsLastHour
        expr: rate(node_vmstat_oom_kill[1h]) > 0
        for: 1m
        labels:
          severity: warning
          category: memory
        annotations:
          summary: '{{ $labels.instance }} saw OOM kills in the last hour'
          description: |
            Linux OOM killer fired on {{ $labels.instance }} within the last
            hour. Check journalctl for the killed cgroup/process.

      - alert: HighMemoryPressure
        expr: |
          (
            node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
          ) < 0.05
        for: 10m
        labels:
          severity: warning
          category: memory
        annotations:
          summary: '{{ $labels.instance }}: <5% memory available for 10m'
