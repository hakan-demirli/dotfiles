id = "vm-qemu-1"
role = "kvm-guest"
state = "provisioned"

[location]
kind = "kvm-guest"
host = "server-fpga-build-0"

[ownership]
class = "personal"
owner = "user-0"
operator = "user-0"
custodian = "user-0"

[hardware]
arch = "x86_64-linux"

[disko]
root_disk = "/dev/vda"
layout = "btrfs-lvm"
managed = true
swap_size = "1G"

[impermanence]
enable = true
rollback_backend = "btrfs"
persisted_paths = ["/var/log"]

[labels]
legacy = "dotfiles/vm_qemu_x86"
