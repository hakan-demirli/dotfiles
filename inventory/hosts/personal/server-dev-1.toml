id = "server-dev-1"
role = "personal-server"
state = "provisioned"
slurm_features = ["amd", "storage"]
slurm_weight = 50

[location]
kind = "workstation"

[ownership]
class = "personal"
owner = "user-0"
operator = "user-0"
custodian = "user-0"

[hardware]
cpu_vendor = "amd"
arch = "x86_64-linux"

[disko]
root_disk = "/dev/sda"
layout = "btrfs-lvm"
managed = true
swap_size = "32G"

[impermanence]
enable = true
rollback_backend = "btrfs"
persisted_paths = ["/var/lib/libvirt", "/var/log", "/var/lib/bluetooth"]

[labels]
legacy = "dotfiles/s02"
storage = "dual-hdd-btrfs"
tailscale_authority = "true"
