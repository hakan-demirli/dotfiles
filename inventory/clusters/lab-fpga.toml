id = "lab-fpga"
description = "FPGA lab cluster (Vivado builds + V80 dev queue), slurm-scheduled"
kind = "shared"
state = "active"
project = "lab-fpga"

[lifecycle]
created_at = "2025-06-01"

[ownership]
class = "company"
team = "team-research"

[scheduler]
kind = "slurm"
controllers = ["vps-oracle-0"]
dbd = "vps-oracle-0"
[scheduler.backing_db]
type = "mariadb"
nodes = ["vps-oracle-0"]
[scheduler.partitions]
[scheduler.partitions.build]
nodes = ["server-fpga-build-0"]
max_time = "24:00:00"
[scheduler.partitions.fpga]
nodes = ["server-fpga-dev-0"]
default = true
max_time = "24:00:00"
gres = "fpga:v80:1"

[members]
hosts = []
roles = ["lab-fpga-build", "lab-fpga-dev"]

[access]
users = []

[[access.teams]]
team = "team-research"
can_submit_to = []
[access.teams.tier]
admin = "admin"
member = "standard"
viewer = "viewer"

[network]
intra_cluster = "mesh"
tailscale_tag = "tag:cluster-lab-fpga"
[network.egress]
clusters = []
internet = true
[network.ingress]
clusters = []
public = []

[keys]
ssh = []
age = []

[secret_paths.munge-key]
source_key = "munge_key"
path = "/etc/munge/munge.key"
owner = "munge"
group = "munge"
mode = "0400"

[labels]
scope = "lab"
