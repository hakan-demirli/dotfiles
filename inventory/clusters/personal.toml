id = "personal"
description = "Personal slurm cluster (laptops + dev servers); single-user fleet"
kind = "personal"
state = "active"
project = "personal"

[lifecycle]
created_at = "2025-01-01"

[ownership]
class = "personal"
team = "team-user-0"

[scheduler]
kind = "slurm"
controllers = ["vps-oracle-0"]
dbd = "vps-oracle-0"
[scheduler.backing_db]
type = "mariadb"
nodes = ["vps-oracle-0"]
[scheduler.partitions]
[scheduler.partitions.default]
nodes = ["server-dev-0", "server-dev-1"]
default = true
max_time = "INFINITE"
[scheduler.partitions.laptops]
nodes = ["laptop-0", "laptop-1"]
max_time = "01:00:00"

[members]
hosts = []
roles = ["personal-laptop", "personal-server"]

[access]
users = []

[[access.teams]]
team = "team-user-0"
tier = "admin"
can_submit_to = []

[network]
intra_cluster = "mesh"
tailscale_tag = "tag:cluster-personal"
[network.egress]
clusters = []
internet = true
[network.ingress]
clusters = []
public = []

[keys]
ssh = []
age = []

[secret_paths.munge-key]
source_key = "munge_key"
path = "/etc/munge/munge.key"
owner = "munge"
group = "munge"
mode = "0400"

[labels]
scope = "personal"
